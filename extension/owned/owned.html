<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>擁有貓咪清單</title>
<link rel="stylesheet" href="owned.css">

<header id="topbar">
  <h1>擁有貓咪清單</h1>
  <span id="stats" class="badge"></span>
</header>

<div id="controls">
  <input id="search" type="search" placeholder="搜尋貓名（含各型態名）…" aria-label="搜尋貓名">
  <label class="field">型態
    <select id="form-sel">
      <option value="0">基本</option>
      <option value="1">二階</option>
      <option value="2">三階</option>
      <option value="3">四階</option>
    </select>
  </label>
  <label class="field">擁有
    <select id="own-state">
      <option value="">全部</option>
      <option value="1">已擁有</option>
      <option value="0">未擁有</option>
    </select>
  </label>
  <label class="field">佔位名
    <select id="ph-state" title="尚未實裝、只有編號的貓（如 817-1）">
      <option value="">顯示</option>
      <option value="hide">隱藏</option>
      <option value="only">只看</option>
    </select>
  </label>
  <button id="export" type="button" class="btn-secondary"
    title="換取最新 o 短碼並在 godfat 開啟；該網址可收藏當備份">在 godfat 開啟清單</button>
</div>

<div id="rarity-filter" role="group" aria-label="稀有度篩選"></div>

<div id="import-box">
  <input id="import-input" type="text" placeholder="貼上含 o= 的 godfat 網址（或裸短碼）…">
  <button id="import-preview" type="button" class="btn-secondary">匯入…</button>
  <span id="import-result"></span>
</div>

<div id="status"></div>
<div id="groups"></div>

<script type="module" src="owned.js"></script>
